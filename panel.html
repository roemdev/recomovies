<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi lista de películas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="panel-body">

  <div id="screen-panel-login" class="screen active">
    <div class="noise"></div>
    <div class="center-wrap">
      <div class="brand">🎬</div>
      <h1 class="title">Mi lista</h1>
      <p class="hint">Accede con tu código de propietario.</p>
      <div class="field-group">
        <input type="password" id="owner-code-input" placeholder="Código de propietario" />
        <button class="btn-main" onclick="ownerLogin()">Ver lista →</button>
      </div>
      <p id="owner-error" class="error-msg"></p>
    </div>
  </div>

  <div id="screen-panel-main" class="screen">
    <div class="noise"></div>
    <header class="top-bar">
      <span class="top-logo">🎬 Mi lista</span>
      <div style="display:flex;gap:12px;align-items:center;">
        <span class="count-pill" id="rec-count">0 películas</span>
        <button class="btn-ghost small" onclick="ownerLogout()">Salir</button>
      </div>
    </header>
    <div class="panel-grid" id="panel-grid">
      <div class="empty-state">Cargando...</div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="panel.js"></script>
</body>
</html>
