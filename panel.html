<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recomovie - Panel de Administración</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── LOGIN PANEL ───────────────────────────── -->
  <div id="screen-panel-login" class="screen active">
    <div class="center-wrap fade-in">
      <div class="login-box">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" fill="currentColor" class="logo-icon"><path d="M12 2L22 7L12 12L2 7L12 2ZM2 17L12 22L22 17V10.5L12 15.5L2 10.5V17Z"/></svg>
        </div>
        <h1 class="title">Administración</h1>
        <p class="hint">Acceso privado al panel de Recomovie.</p>
        
        <div class="field-group">
          <div class="input-wrap">
            <input type="password" id="owner-code-input" placeholder="Código de propietario" />
          </div>
          <p id="owner-error" class="error-msg"></p>
          <button class="btn-main mt-4" onclick="ownerLogin()">Entrar al panel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── PANEL MAIN ────────────────────────────── -->
  <div id="screen-panel-main" class="screen">
    
    <header class="top-bar">
      <div class="top-logo-wrap">
        <svg viewBox="0 0 24 24" fill="currentColor" class="logo-icon-small"><path d="M12 2L22 7L12 12L2 7L12 2ZM2 17L12 22L22 17V10.5L12 15.5L2 10.5V17Z"/></svg>
        <span class="top-logo-text">Recomovie Panel</span>
      </div>
      
      <div class="top-right">
        <button class="btn-icon" onclick="ownerLogout()" title="Cerrar sesión">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </button>
      </div>
    </header>

    <main class="main-content">
      
      <div class="panel-header">
        <div>
          <h1 class="hero-title" style="margin-bottom: 0;">Lista general</h1>
          <p class="hero-subtitle mt-2" id="rec-count">0 películas en la base de datos.</p>
        </div>
        
        <div class="filters-bar">
          <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Todas</button>
          <button class="filter-btn" data-filter="downloaded" onclick="setFilter('downloaded', this)">Descargadas</button>
          <button class="filter-btn" data-filter="pending" onclick="setFilter('pending', this)">Pendientes</button>
        </div>
      </div>

      <div class="section-title mt-4" id="section-label">Películas sugeridas ›</div>
      
      <div class="jf-grid slide-up" id="panel-grid">
        <div class="empty-state">Conectando al servidor...</div>
      </div>
    </main>

  </div>

  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="panel.js"></script>
</body>
</html>
