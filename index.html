<!DOCTYPE html>
<html lang="es" data-theme="jellyfin">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recomiéndame una peli</title>
  
  <!-- Fuentes para todos los temas -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&family=VT323&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Elementos de fondo dinámicos según el tema -->
  <div class="theme-backgrounds">
    <!-- Orbes para Jellyfin -->
    <div class="bg-orb orb-cyan"></div>
    <div class="bg-orb orb-purple"></div>
    <div class="bg-orb orb-light"></div>
    <!-- Ruido / CRT para Clásico y Apocalíptico -->
    <div class="bg-noise"></div>
    <div class="bg-crt-lines"></div>
  </div>

  <!-- SELECTOR DE TEMAS GLOBAL -->
  <div class="theme-switcher">
    <select id="theme-select" onchange="changeTheme(this.value)">
      <option value="jellyfin">Tema: Jellyfin</option>
      <option value="classic">Tema: Clásico</option>
      <option value="apocalyptic">Tema: Apocalíptico</option>
    </select>
  </div>

  <!-- ── LOGIN ──────────────────────────────────── -->
  <div id="screen-code" class="screen active">
    <div class="center-wrap fade-in">
      <div class="glass-panel login-box slide-up">
        <div class="glass-glare"></div>
        <div class="brand-logo">R</div>
        <h1 class="title">Reco<span class="text-accent">miéndame</span></h1>
        <p class="hint">Conéctate al servidor de películas para recomendarle una a tu amigo.</p>
        
        <div class="field-group">
          <div class="input-wrap">
            <label>Nombre de Perfil</label>
            <input type="text" id="input-name" placeholder="¿Quién eres?" autocomplete="off" />
          </div>
          <div class="input-wrap">
            <label>Código de Servidor</label>
            <input type="password" id="input-code" placeholder="Escribe el código" />
          </div>
          <p id="code-error" class="error-msg"></p>
          <button class="btn-main mt-4" onclick="enterApp()">Conectar al servidor</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── SEARCH ─────────────────────────────────── -->
  <div id="screen-search" class="screen">
    
    <header class="top-bar glass-panel">
      <div class="top-logo-wrap">
        <div class="brand-logo small">R</div>
        <span class="top-logo-text">Reco<span class="text-accent">miéndame</span></span>
      </div>
      
      <div class="search-bar-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Buscar películas por título..." oninput="handleSearch(this.value)" autocomplete="off" />
        <div class="spinner" id="spinner"></div>
      </div>

      <div class="top-right">
        <div class="user-badge">
          <div class="user-avatar" id="top-user-avatar">?</div>
          <span id="top-user-name" class="hidden-mobile"></span>
        </div>
        <button class="btn-icon" onclick="logoutToLogin()" title="Salir">✖</button>
      </div>
    </header>

    <main class="main-content">
      <h2 class="section-title">Resultados de búsqueda</h2>
      <div id="results-container" class="results-grid slide-up">
        <!-- Los resultados se inyectan aquí -->
      </div>

      <!-- MODAL DE CONFIRMACIÓN -->
      <div id="confirm-panel" class="modal-overlay hidden">
        <div class="modal-backdrop" onclick="cancelConfirm()"></div>
        <div class="glass-panel modal-content slide-up">
          <button class="modal-close" onclick="cancelConfirm()">✖</button>
          
          <div class="modal-body" id="confirm-content">
            <!-- Contenido inyectado por JS -->
          </div>

          <div class="modal-footer">
            <p id="confirm-feedback" class="error-msg"></p>
            <div class="confirm-actions">
              <button class="btn-main" id="confirm-btn" onclick="submitRecommendation()">Confirmar y Recomendar</button>
              <button class="btn-ghost" onclick="cancelConfirm()">Cancelar</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- ── SUCCESS ────────────────────────────────── -->
  <div id="screen-success" class="screen">
    <div class="center-wrap fade-in">
      <div class="glass-panel success-box slide-up">
        <div class="success-icon-wrap">
          <div class="success-glow"></div>
          <div class="success-icon">✓</div>
        </div>
        <h2 class="title" style="margin-bottom: 0.5rem;">¡Añadida al servidor!</h2>
        <p class="hint" id="success-msg" style="margin-bottom: 2rem;"></p>
        <button class="btn-main" onclick="recomendar()">Hacer otra recomendación</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="tmdb.js"></script>
  <script src="app.js"></script>
</body>
</html>
